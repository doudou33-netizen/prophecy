<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予言</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 待機画面 */
    #waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    #waiting h1 {
      color: #c9a84c;
      font-size: 28px;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }

    #waiting p {
      color: #555;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* 結果画面 */
    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: #0a0a0a;
    }

    .suit {
      font-size: 180px;
      line-height: 1;
      filter: drop-shadow(0 0 30px currentColor);
      animation: reveal 0.8s ease-out;
    }

    .suit.red { color: #c0392b; }
    .suit.black { color: #ecf0f1; }

    .suit-name {
      font-size: 22px;
      letter-spacing: 8px;
      margin-top: 20px;
      animation: reveal 0.8s ease-out;
    }

    .suit-name.red { color: #c0392b; }
    .suit-name.black { color: #ecf0f1; }

    .gold-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c, transparent);
      margin: 24px auto;
      animation: reveal 1s ease-out;
    }

    #reset-btn {
      margin-top: 40px;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 14px;
      letter-spacing: 4px;
      border-radius: 30px;
      animation: reveal 1.2s ease-out;
    }

    @keyframes reveal {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="waiting">
    <h1>予　言</h1>
    <p>iPhoneを裏向きにしてください</p>
  </div>

  <div id="result">
    <div class="gold-line"></div>
    <div class="suit" id="suitSymbol"></div>
    <div class="suit-name" id="suitName"></div>
    <div class="gold-line"></div>
    <button id="reset-btn" onclick="reset()">もう一度</button>
  </div>

  <script>
    const suits = [
      { symbol: '♠', name: 'スペード', color: 'black' },
      { symbol: '♥', name: 'ハート',   color: 'red'   },
      { symbol: '♦', name: 'ダイヤ',   color: 'red'   },
      { symbol: '♣', name: 'クラブ',   color: 'black' },
    ];

    let revealed = false;
    let faceDown = false;

    function showResult(suit) {
      if (revealed) return;
      revealed = true;

      document.getElementById('suitSymbol').textContent = suit.symbol;
      document.getElementById('suitSymbol').className = 'suit ' + suit.color;
      document.getElementById('suitName').textContent = suit.name;
      document.getElementById('suitName').className = 'suit-name ' + suit.color;

      document.getElementById('waiting').style.display = 'none';
      document.getElementById('result').style.display = 'flex';
    }

    function reset() {
      revealed = false;
      faceDown = false;
      document.getElementById('waiting').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
    }

    window.addEventListener('deviceorientation', function(e) {
      if (revealed) return;

      const beta  = e.beta;  // 前後の傾き（-180〜180）
      const gamma = e.gamma; // 左右の傾き（-90〜90）

      // 裏向き検知（beta が -90 付近 または 180付近）
      const isDown = Math.abs(beta) > 150 || beta < -150;

      if (isDown) {
        faceDown = true;
        return;
      }

      if (!faceDown) return;

      // 表向きに戻した際の傾き方向で判定（敏感モード：15度以上）
      const threshold = 15;

      if (beta > threshold && Math.abs(gamma) < 45) {
        showResult(suits[0]); // 上に傾ける → ♠
      } else if (beta < -threshold && Math.abs(gamma) < 45) {
        showResult(suits[1]); // 下に傾ける → ♥
      } else if (gamma < -threshold && Math.abs(beta) < 45) {
        showResult(suits[2]); // 左に傾ける → ♦
      } else if (gamma > threshold && Math.abs(beta) < 45) {
        showResult(suits[3]); // 右に傾ける → ♣
      }
    });

    // iOS の許可リクエスト
    window.addEventListener('load', function() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('waiting').innerHTML = `
          <h1>予　言</h1>
          <p style="color:#555; font-size:14px; letter-spacing:2px; margin-bottom:30px;">開始するにはタップしてください</p>
          <button onclick="requestPermission()" style="padding:14px 36px; background:transparent; border:1px solid #c9a84c; color:#c9a84c; font-size:14px; letter-spacing:4px; border-radius:30px;">START</button>
        `;
      }
    });

    function requestPermission() {
      DeviceOrientationEvent.requestPermission().then(state => {
        if (state === 'granted') {
          document.getElementById('waiting').innerHTML = `
            <h1>予　言</h1>
            <p style="color:#555; font-size:14px; letter-spacing:2px;">iPhoneを裏向きにしてください</p>
          `;
        }
      });
    }
  </script>
</body>
</html>
